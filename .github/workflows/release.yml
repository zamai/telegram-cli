name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish, for example v0.9.2'
        required: true
        type: string

# Least privilege: goreleaser only needs to create the release / upload assets.
permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.25"
          # setup-go caches the module and build caches by default (keyed on
          # go.sum), so the manual cache + set-output steps are no longer needed.

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional built-in app credentials injected into the binaries via
          # -ldflags when the repository secrets are present. Without them,
          # users provide credentials with `tg init --app-id --app-hash`.
          APP_ID: ${{ secrets.APP_ID }}
          APP_HASH: ${{ secrets.APP_HASH }}

      - name: Upload assets
        uses: actions/upload-artifact@v7.0.1
        with:
          name: cli
          path: dist/*
