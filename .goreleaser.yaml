version: 2
project_name: tg
before:
  hooks:
    - go mod tidy
    - go generate ./...
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/tg
    # Inject built-in app credentials from APP_ID/APP_HASH when present.
    # Fork releases can publish without secrets; credentials must then be
    # configured per account.
    ldflags:
      - -s -w
      - -X main.builtinAppID={{ envOrDefault "APP_ID" "" }}
      - -X main.builtinAppHash={{ envOrDefault "APP_HASH" "" }}
checksum:
  name_template: 'checksums.txt'
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^chore(dep):'
      - '^test:'
